name: "Notify to Slack"
description: "Send notification to slack"

inputs:
  webhook_url:
    description: “Slack webhook url”
    required: true
  message:
    description: “Message”
    default: "CI job failed"
  channel:
    description: "Slack channel"
    default: "#ci"

runs:
  using: "composite"
  steps:
    - uses: slackapi/slack-github-action@v3.0.1
      with:
        webhook: ${{ inputs.webhook_url }}
        webhook-type: INCOMING_WEBHOOK
        payload: |
          {
            "channel": "${{ inputs.channel }}",
            "text": "${{ inputs.message }} - <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.repository }} - ${{ github.ref_name }}>",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "${{ inputs.message }}",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Project:*\n${{ github.repository }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Branch*:\n${{ github.ref_name }}"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow>"
                }
              }
            ]
          }
